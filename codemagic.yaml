workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: 3.27.4
      vars:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    cache:
      cache_paths: []
    scripts:
      - name: Set Kotlin version
        script: |
          echo "kotlin.code.style=official" >> android/gradle.properties
          echo "kotlin.jvm.target.validation.mode=IGNORE" >> android/gradle.properties
      - name: Clean build
        script: flutter clean
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
